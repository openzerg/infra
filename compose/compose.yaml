services:
  postgres:
    image: docker.io/library/postgres:latest
    container_name: uz-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-openzerg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openzerg}
      POSTGRES_DB: ${POSTGRES_DB:-openzerg}
    volumes:
      - ${HOME}/.local/share/openzerg/postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openzerg}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - openzerg-net

  registry:
    build:
      context: ../..
      dockerfile: registry/Containerfile
    container_name: uz-registry
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-openzerg}:${POSTGRES_PASSWORD:-openzerg}@uz-postgres:5432/${POSTGRES_DB:-openzerg}
      PORT: "25000"
      MASTER_API_KEY: ${MASTER_API_KEY:-dev-master-key}
      WM_URL: http://uz-workspace-manager:25020
      TSM_URL: http://uz-tool-server-manager:25021
      IDLE_TIMEOUT_SEC: ${IDLE_TIMEOUT_SEC:-3600}
    networks:
      - openzerg-net

  workspace-manager:
    build:
      context: ../..
      dockerfile: workspace-manager/Containerfile
    container_name: uz-workspace-manager
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-openzerg}:${POSTGRES_PASSWORD:-openzerg}@uz-postgres:5432/${POSTGRES_DB:-openzerg}
      PORT: "25020"
      PODMAN_SOCKET: /run/podman/podman.sock
      PODMAN_NETWORK: ${PODMAN_NETWORK:-openzerg-net}
      WORKER_IMAGE: ${WORKER_IMAGE:-localhost/openzerg/worker:latest}
    volumes:
      - /run/user/1000/podman/podman.sock:/run/podman/podman.sock
    networks:
      - openzerg-net

  tool-server-manager:
    build:
      context: ../..
      dockerfile: tool-server-manager/Containerfile
    container_name: uz-tool-server-manager
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-openzerg}:${POSTGRES_PASSWORD:-openzerg}@uz-postgres:5432/${POSTGRES_DB:-openzerg}
      PORT: "25021"
      PODMAN_SOCKET: /run/podman/podman.sock
      PODMAN_NETWORK: ${PODMAN_NETWORK:-openzerg-net}
      REGISTRY_URL: http://uz-registry:25000
    volumes:
      - /run/user/1000/podman/podman.sock:/run/podman/podman.sock
    networks:
      - openzerg-net

  ai-proxy:
    build:
      context: ../..
      dockerfile: ai-proxy/Containerfile
    container_name: uz-ai-proxy
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-openzerg}:${POSTGRES_PASSWORD:-openzerg}@uz-postgres:5432/${POSTGRES_DB:-openzerg}
      AI_PROXY_PORT: "25300"
      REGISTRY_URL: http://uz-registry:25000
    networks:
      - openzerg-net

  skill-manager:
    build:
      context: ../..
      dockerfile: skill-manager/Containerfile
    container_name: uz-skill-manager
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-openzerg}:${POSTGRES_PASSWORD:-openzerg}@uz-postgres:5432/${POSTGRES_DB:-openzerg}
      PORT: "25200"
      REGISTRY_URL: http://uz-registry:25000
    networks:
      - openzerg-net

  agent:
    build:
      context: ../..
      dockerfile: agent/Containerfile
    container_name: uz-agent
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-openzerg}:${POSTGRES_PASSWORD:-openzerg}@uz-postgres:5432/${POSTGRES_DB:-openzerg}
      AGENT_PORT: "25100"
      REGISTRY_URL: http://uz-registry:25000
      TSM_URL: http://uz-tool-server-manager:25021
      ADMIN_TOKEN: ${MASTER_API_KEY:-dev-master-key}
    networks:
      - openzerg-net

  nginx:
    build:
      context: ../..
      dockerfile: infra/nginx/Containerfile
    container_name: uz-nginx
    restart: unless-stopped
    depends_on:
      - registry
      - workspace-manager
      - tool-server-manager
    ports:
      - "${NGINX_PORT:-58080}:8080"
    networks:
      - openzerg-net

networks:
  openzerg-net:
    external: true
